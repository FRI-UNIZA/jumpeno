name: Dev Build&Deploy

on:
  push:
    branches: [ development ]
  workflow_dispatch: # To run this workflow manually from the Actions tab

jobs:
  build: # Job 1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'development'
      - name: Inject secrets
        run: |
          jq '.JWT_SECRET = "${{ secrets.JWT_SECRET }}" |
              .Authentication.FACEBOOK_APPID = "${{ secrets.AUTHENTICATION_FACEBOOK_APPID }}" |
              .Authentication.FACEBOOK_APPSECRET = "${{ secrets.AUTHENTICATION_FACEBOOK_APPSECRET }}" |
              .Authentication.GOOGLE_CLIENTID = "${{ secrets.AUTHENTICATION_GOOGLE_CLIENTID }}" |
              .Authentication.GOOGLE_CLIENTSECRET = "${{ secrets.AUTHENTICATION_GOOGLE_CLIENTSECRET }}"' \
              Jumpeno.Server/appsettings.json > Jumpeno.Server/appsettings.tmp.json && \
          mv Jumpeno.Server/appsettings.tmp.json Jumpeno.Server/appsettings.json
      - name: Login to GitHub
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: docker login https://ghcr.io -u $GITHUB_USER -p $GITHUB_PASSWORD
      - name: Build Image
        run: docker build -t ghcr.io/fri-uniza/jumpeno/jumpeno:dev .
      - name: Push Image
        run: docker push ghcr.io/fri-uniza/jumpeno/jumpeno:dev
  deploy: # Job 2:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with: 
          ref: 'development'
      - name: Push with curl
        uses: wei/curl@v1
        with:
          args: -X POST -k ${{ secrets.PORTAINER_WEBHOOK_URL }}
